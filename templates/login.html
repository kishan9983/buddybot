<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — BuddyBot</title>
  <meta name="description" content="Login to BuddyBot — your premium AI assistant"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
  <canvas id="three-canvas"></canvas>

  <div id="toast-container"></div>

  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">🤖</div>
        <h1>BuddyBot</h1>
        <p>Your Premium AI Assistant</p>
      </div>

      <p class="auth-subtitle">Sign in to continue your conversation</p>

      <form id="login-form" autocomplete="on">
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">✉️</span>
            <input class="form-input" type="email" id="email" name="email"
                   placeholder="you@example.com" required autocomplete="email"/>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input class="form-input" type="password" id="password" name="password"
                   placeholder="Enter your password" required autocomplete="current-password"/>
            <button type="button" class="toggle-password" title="Show/hide password">👁️</button>
          </div>
        </div>



        <button type="submit" class="btn btn-primary" id="login-btn">
          <span class="btn-text">Sign In 🚀</span>
          <span class="spinner"></span>
        </button>
      </form>

      <div class="auth-links">
        Don't have an account? <a href="/register">Create one free</a>
      </div>
    </div>
  </main>

  <script type="module" src="/static/js/three-bg.js"></script>
  <script src="/static/js/auth.js"></script>
</body>
</html>
