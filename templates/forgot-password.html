<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — BuddyBot</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
  <canvas id="three-canvas"></canvas>
  <div id="toast-container"></div>

  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">🔑</div>
        <h1>BuddyBot</h1>
        <p>Reset your password</p>
      </div>

      <p class="auth-subtitle">Enter your email and we'll send you an OTP code to reset your password.</p>

      <form id="forgot-form">
        <div class="form-group">
          <label for="email">Registered Email</label>
          <div class="input-wrapper">
            <span class="input-icon">✉️</span>
            <input class="form-input" type="email" id="email" name="email"
                   placeholder="you@example.com" required/>
          </div>
        </div>

        <button type="submit" class="btn btn-primary">
          <span class="btn-text">Send OTP 📧</span>
          <span class="spinner"></span>
        </button>
      </form>

      <div class="auth-links" style="margin-top:16px;">
        <a href="/login">← Back to Login</a>
      </div>
    </div>
  </main>

  <script type="module" src="/static/js/three-bg.js"></script>
  <script src="/static/js/auth.js"></script>
</body>
</html>
