<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — BuddyBot</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
  <canvas id="three-canvas"></canvas>
  <div id="toast-container"></div>

  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">🛡️</div>
        <h1>New Password</h1>
        <p>Choose a strong new password</p>
      </div>

      <form id="reset-form">
        <div class="form-group">
          <label for="password">New Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input class="form-input" type="password" id="password" name="password"
                   placeholder="At least 8 characters" required autocomplete="new-password"/>
            <button type="button" class="toggle-password" title="Show/hide">👁️</button>
          </div>
          <div class="strength-bar"><div class="strength-fill"></div></div>
        </div>

        <div class="form-group">
          <label for="confirm_password">Confirm New Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input class="form-input" type="password" id="confirm_password" name="confirm_password"
                   placeholder="Re-enter new password" required autocomplete="new-password"/>
            <button type="button" class="toggle-password" title="Show/hide">👁️</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary">
          <span class="btn-text">Reset Password 🔐</span>
          <span class="spinner"></span>
        </button>
      </form>
    </div>
  </main>

  <script type="module" src="/static/js/three-bg.js"></script>
  <script src="/static/js/auth.js"></script>
</body>
</html>
